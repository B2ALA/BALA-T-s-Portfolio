<!-- index.html (only the Infrastructure panel section shown; keep the rest of your page intact) -->
<article id="infraPanel" class="panel panel--glass panel--infra" aria-labelledby="infra-title" tabindex="0" data-panel="infrastructure">
  <h2 id="infra-title" class="panel-title">Server & Pipeline Infrastructure</h2>

  <div class="scene scene--infra" id="infraScene" role="img" aria-label="Server room and pipelines">
    <!-- Server racks (SVG) -->
    <svg id="infraRacksSVG" viewBox="0 0 900 520" preserveAspectRatio="xMidYMid meet" class="infra-svg" aria-hidden="true">
      <defs>
        <linearGradient id="rackGrad" x1="0" x2="1">
          <stop offset="0" stop-color="#071226"/>
          <stop offset="1" stop-color="#0f1724"/>
        </linearGradient>
        <filter id="ledGlow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="6" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- three racks -->
      <g id="racks" transform="translate(40,40)"></g>

      <!-- circuit lines layer -->
      <g id="circuitLines" transform="translate(0,0)"></g>

      <!-- packet layer (SVG group for crisp glow) -->
      <g id="packets" transform="translate(0,0)"></g>
    </svg>

    <!-- Binary streams container (DOM-based for text rendering & neon glow) -->
    <div id="binaryStreams" class="binary-streams" aria-hidden="true"></div>

    <!-- Floating labels -->
    <div id="infraLabels" class="infra-labels" aria-hidden="true"></div>

    <!-- Overlay for subtle vignette and glow -->
    <div class="infra-overlay" aria-hidden="true"></div>
  </div>
</article>
